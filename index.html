<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" href="favicons/pokeball.png">
    <link rel="stylesheet" href="css/style.css">

    <script defer src="js/script.js"></script>

    <title>Pokédex</title>
</head>
<body>
    
    <main>

        <img src="#" class="pokemon-img">
        <img src="images/pokedex.png" class="pokedex">

        <h1 class="pokemon-info">
            <span class="pokemon-num"></span> -
            <span class="pokemon-name"></span>
        </h1>

        <form class="form">
            <input type="search"
            class="input-search"
            placeholder="Name or Number"
            required/>
        </form>

        <div class="buttons">
            <button  class="button but-prev">Prev &lt</button>
            <button  class="button but-next">Next &gt</button>
        </div>

    </main>


</body>
</html>
